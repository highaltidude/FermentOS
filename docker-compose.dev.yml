services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fermentos
      POSTGRES_USER: fermentos
      POSTGRES_PASSWORD: fermentos
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fermentos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: deps
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fermentos:fermentos@db:5432/fermentos
      NODE_ENV: development
      PORT: 8080
      BASE_PATH: /
    ports:
      - "8080:8080"
      - "23975:23975"
    volumes:
      - .:/app
      - /app/node_modules
    command: >
      sh -c "pnpm --filter @workspace/api-server run dev &
             pnpm --filter @workspace/fermentos run dev &
             wait"

volumes:
  postgres_data_dev:
