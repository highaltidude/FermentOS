services:
  db:
    image: postgres:16-alpine
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: fermentos
      POSTGRES_USER: fermentos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fermentos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fermentos"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://fermentos:${DB_PASSWORD:-fermentos}@db:5432/fermentos
      SESSION_SECRET: ${SESSION_SECRET}
      NODE_ENV: production
      PORT: 8080
      BASE_PATH: /
    ports:
      - "${HOST_PORT:-3000}:8080"
    volumes:
      - ./data/uploads:/app/data/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
