openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: FermentOS API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: recipes
    description: Beer recipe management
  - name: ingredients
    description: Recipe ingredient management
  - name: steps
    description: Step-by-step brewing instructions for recipes
  - name: brew-sessions
    description: Brew session tracking
  - name: fermentation
    description: Fermentation readings
  - name: inventory
    description: Ingredient inventory management
  - name: dashboard
    description: Dashboard and summary data
  - name: settings
    description: App settings (beer styles, etc.)
  - name: sensors
    description: Sensor device management (iSpindel, Tilt, RAPT Pill, etc.)
  - name: integrations
    description: Third-party device integrations and telemetry ingest
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/active-brews:
    get:
      operationId: getActiveBrews
      tags: [dashboard]
      summary: Get active brew sessions with latest fermentation data
      responses:
        "200":
          description: Active brew sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActiveBrew"

  /dashboard/upcoming-brews:
    get:
      operationId: getUpcomingBrews
      tags: [dashboard]
      summary: Get scheduled brew sessions sorted by brew date ascending
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Upcoming scheduled brew sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UpcomingBrew"

  /recipes:
    get:
      operationId: listRecipes
      tags: [recipes]
      summary: List all recipes
      parameters:
        - name: style
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of recipes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Recipe"
    post:
      operationId: createRecipe
      tags: [recipes]
      summary: Create a new recipe
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipeBody"
      responses:
        "201":
          description: Recipe created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"

  /recipes/styles:
    get:
      operationId: getRecipeStyles
      tags: [recipes]
      summary: Get recipe counts grouped by beer style
      responses:
        "200":
          description: Recipe style breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StyleCount"

  /recipes/{id}:
    get:
      operationId: getRecipe
      tags: [recipes]
      summary: Get a recipe by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeWithIngredients"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateRecipe
      tags: [recipes]
      summary: Update a recipe
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipeBody"
      responses:
        "200":
          description: Updated recipe
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Recipe"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteRecipe
      tags: [recipes]
      summary: Delete a recipe
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /recipes/{id}/ingredients:
    get:
      operationId: listRecipeIngredients
      tags: [ingredients]
      summary: List ingredients for a recipe
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeIngredient"
    post:
      operationId: addRecipeIngredient
      tags: [ingredients]
      summary: Add an ingredient to a recipe
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipeIngredientBody"
      responses:
        "201":
          description: Ingredient added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeIngredient"

  /ingredients/{id}:
    put:
      operationId: updateRecipeIngredient
      tags: [ingredients]
      summary: Update a recipe ingredient
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipeIngredientBody"
      responses:
        "200":
          description: Updated ingredient
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeIngredient"
    delete:
      operationId: deleteRecipeIngredient
      tags: [ingredients]
      summary: Delete a recipe ingredient
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /recipes/{id}/steps:
    get:
      operationId: listRecipeSteps
      tags: [steps]
      summary: List ordered brewing steps for a recipe
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: List of steps (ordered by position)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeStep"
    post:
      operationId: addRecipeStep
      tags: [steps]
      summary: Append a brewing step to a recipe
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecipeStepBody"
      responses:
        "201":
          description: Step created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeStep"

  /steps/{id}:
    put:
      operationId: updateRecipeStep
      tags: [steps]
      summary: Update a brewing step
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecipeStepBody"
      responses:
        "200":
          description: Updated step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecipeStep"
    delete:
      operationId: deleteRecipeStep
      tags: [steps]
      summary: Delete a brewing step
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /recipes/{id}/steps/reorder:
    put:
      operationId: reorderRecipeSteps
      tags: [steps]
      summary: Replace the ordering of a recipe's steps
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRecipeStepsBody"
      responses:
        "200":
          description: Reordered steps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecipeStep"

  /brew-sessions:
    get:
      operationId: listBrewSessions
      tags: [brew-sessions]
      summary: List all brew sessions
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/BrewStatus"
        - name: recipeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of brew sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BrewSession"
    post:
      operationId: createBrewSession
      tags: [brew-sessions]
      summary: Create a new brew session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBrewSessionBody"
      responses:
        "201":
          description: Brew session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrewSession"

  /brew-sessions/{id}:
    get:
      operationId: getBrewSession
      tags: [brew-sessions]
      summary: Get a brew session by ID
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Brew session with readings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrewSessionWithReadings"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateBrewSession
      tags: [brew-sessions]
      summary: Update a brew session
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBrewSessionBody"
      responses:
        "200":
          description: Updated brew session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrewSession"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBrewSession
      tags: [brew-sessions]
      summary: Delete a brew session
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /brew-sessions/{id}/readings:
    get:
      operationId: listFermentationReadings
      tags: [fermentation]
      summary: List fermentation readings for a brew session
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: List of fermentation readings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FermentationReading"
    post:
      operationId: addFermentationReading
      tags: [fermentation]
      summary: Add a fermentation reading
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFermentationReadingBody"
      responses:
        "201":
          description: Reading added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FermentationReading"

  /readings/{id}:
    delete:
      operationId: deleteFermentationReading
      tags: [fermentation]
      summary: Delete a fermentation reading
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /status-log/{id}:
    delete:
      operationId: deleteStatusLogEntry
      tags: [brew-sessions]
      summary: Delete a status log entry
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /settings/styles:
    get:
      operationId: listBeerStyles
      tags: [settings]
      summary: List all beer styles
      responses:
        "200":
          description: List of beer styles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BeerStyle"
    post:
      operationId: createBeerStyle
      tags: [settings]
      summary: Create a beer style
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBeerStyleBody"
      responses:
        "201":
          description: Beer style created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BeerStyle"

  /settings/styles/{id}:
    delete:
      operationId: deleteBeerStyle
      tags: [settings]
      summary: Delete a beer style
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /settings/unit-system:
    get:
      operationId: getUnitSystem
      tags: [settings]
      summary: Get the unit system preference
      responses:
        "200":
          description: Current unit system
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitSystemResponse"
    put:
      operationId: setUnitSystem
      tags: [settings]
      summary: Set the unit system preference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnitSystemBody"
      responses:
        "200":
          description: Updated unit system
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnitSystemResponse"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List all inventory items
      parameters:
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/IngredientType"
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createInventoryItem
      tags: [inventory]
      summary: Add an inventory item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInventoryItemBody"
      responses:
        "201":
          description: Inventory item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/{id}:
    put:
      operationId: updateInventoryItem
      tags: [inventory]
      summary: Update an inventory item
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInventoryItemBody"
      responses:
        "200":
          description: Updated inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
    delete:
      operationId: deleteInventoryItem
      tags: [inventory]
      summary: Delete an inventory item
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /equipment:
    get:
      operationId: listEquipment
      tags: [equipment]
      summary: List all equipment
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Equipment list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Equipment"
    post:
      operationId: createEquipment
      tags: [equipment]
      summary: Add a piece of equipment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEquipmentBody"
      responses:
        "201":
          description: Created equipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"

  /equipment/{id}:
    put:
      operationId: updateEquipment
      tags: [equipment]
      summary: Update a piece of equipment
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEquipmentBody"
      responses:
        "200":
          description: Updated equipment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Equipment"
    delete:
      operationId: deleteEquipment
      tags: [equipment]
      summary: Delete a piece of equipment
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  # ── Sensor devices ────────────────────────────────────────────────────────
  /sensors/devices:
    get:
      operationId: listSensorDevices
      tags: [sensors]
      summary: List all registered sensor devices with latest reading and assignment
      responses:
        "200":
          description: Sensor device list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorDeviceWithStatus"
    post:
      operationId: createSensorDevice
      tags: [sensors]
      summary: Register a new sensor device
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSensorDeviceBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorDevice"

  /sensors/devices/{id}:
    get:
      operationId: getSensorDevice
      tags: [sensors]
      summary: Get a single sensor device with latest reading and assignment
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Sensor device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorDeviceWithStatus"
        "404":
          description: Not found
    put:
      operationId: updateSensorDevice
      tags: [sensors]
      summary: Update a sensor device (rename, notes, enabled)
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSensorDeviceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorDevice"
        "404":
          description: Not found
    delete:
      operationId: deleteSensorDevice
      tags: [sensors]
      summary: Delete a sensor device and all its readings
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "204":
          description: Deleted

  /sensors/devices/{id}/assign:
    post:
      operationId: assignSensorDevice
      tags: [sensors]
      summary: Assign a sensor device to a brew session
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignDeviceBody"
      responses:
        "200":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorDeviceWithStatus"
    delete:
      operationId: unassignSensorDevice
      tags: [sensors]
      summary: Unassign a sensor device from its current brew session
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Unassigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SensorDeviceWithStatus"

  /sensors/devices/{id}/readings:
    get:
      operationId: listSensorReadings
      tags: [sensors]
      summary: List recent readings for a device
      parameters:
        - $ref: "#/components/parameters/IdParam"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Readings list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorReading"

  /brew-sessions/{id}/sensor-telemetry:
    get:
      operationId: getBrewSensorTelemetry
      tags: [sensors]
      summary: Get sensor telemetry and fermentation insights for a brew session
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Brew telemetry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrewSensorTelemetry"

  # ── iSpindel integration ───────────────────────────────────────────────────
  /integrations/ispindel:
    post:
      operationId: ingestISpindelReading
      tags: [integrations]
      summary: Receive telemetry from an iSpindel device (no auth required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ISpindelPayload"
      responses:
        "200":
          description: Reading accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
        "403":
          description: Invalid token

  /integrations/ispindel/settings:
    get:
      operationId: getISpindelSettings
      tags: [integrations]
      summary: Get iSpindel integration settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ISpindelSettings"
    put:
      operationId: updateISpindelSettings
      tags: [integrations]
      summary: Update iSpindel integration settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ISpindelSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ISpindelSettings"

  /integrations/ispindel/simulate:
    post:
      operationId: simulateISpindelReading
      tags: [integrations]
      summary: Simulate an iSpindel reading for developer testing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulateReadingBody"
      responses:
        "200":
          description: Simulated reading accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  readingId:
                    type: integer
                required: [ok, readingId]

  /integrations/ispindel/status:
    get:
      operationId: getISpindelStatus
      tags: [integrations]
      summary: Home Assistant friendly — all active sensor devices with latest telemetry
      responses:
        "200":
          description: Active device statuses
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/SensorDeviceWithStatus"
                required: [devices]

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: integer
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    BrewStatus:
      type: string
      enum: [brew_day, fermenting, conditioning, packaged]

    IngredientType:
      type: string
      enum: [malt, hop, yeast, adjunct, water_agent, other]

    IngredientUse:
      type: string
      enum: [mash, boil, dry_hop, whirlpool, primary, secondary, packaging, other]

    Recipe:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        style:
          type: string
        batchSizeGallons:
          type: number
        originalGravity:
          type: number
          nullable: true
        finalGravity:
          type: number
          nullable: true
        abv:
          type: number
          nullable: true
        ibu:
          type: number
          nullable: true
        colorSrm:
          type: number
          nullable: true
        estimatedBrewTimeMinutes:
          type: integer
          nullable: true
        efficiencyPercent:
          type: number
          nullable: true
        caloriesPerServing:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
        daysPlanned:
          type: integer
          nullable: true
        daysBrewing:
